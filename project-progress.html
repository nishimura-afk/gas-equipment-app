<div class="space-y-6">
  <div class="flex justify-between items-center border-b pb-4">
    <div>
      <h2 class="text-2xl font-bold text-gray-800"><i class="fas fa-tasks mr-2"></i>案件管理</h2>
      <p class="text-sm text-gray-600">見積依頼から作業完了までを一元管理</p>
    </div>
    <button onclick="progressInit(true)" class="bg-gray-200 hover:bg-gray-300 px-4 py-2 rounded text-sm font-bold transition">
      <i class="fas fa-sync-alt mr-1"></i> 更新
    </button>
  </div>

  <div class="flex border-b bg-white rounded-t-lg overflow-hidden">
    <button onclick="switchProgressView('all')" id="tab-all"
            class="progress-tab px-5 py-3 font-bold text-sm border-b-2 border-blue-600 text-blue-600 bg-white">
      <i class="fas fa-list mr-1"></i>全表示
      <span class="ml-1 bg-blue-100 text-blue-700 px-2 py-0.5 rounded-full text-xs" id="count-all">0</span>
    </button>
    <button onclick="switchProgressView('action')" id="tab-action"
            class="progress-tab px-5 py-3 font-bold text-sm border-b-2 border-transparent text-gray-500 hover:text-gray-700 hover:bg-gray-50">
      <i class="fas fa-hand-pointer mr-1"></i>要対応
      <span class="ml-1 bg-gray-100 text-gray-600 px-2 py-0.5 rounded-full text-xs" id="count-action">0</span>
    </button>
    <button onclick="switchProgressView('waiting')" id="tab-waiting"
            class="progress-tab px-5 py-3 font-bold text-sm border-b-2 border-transparent text-gray-500 hover:text-gray-700 hover:bg-gray-50">
      <i class="fas fa-clock mr-1"></i>業者待ち
      <span class="ml-1 bg-gray-100 text-gray-600 px-2 py-0.5 rounded-full text-xs" id="count-waiting">0</span>
    </button>
    <button onclick="switchProgressView('scheduled')" id="tab-scheduled"
            class="progress-tab px-5 py-3 font-bold text-sm border-b-2 border-transparent text-gray-500 hover:text-gray-700 hover:bg-gray-50">
      <i class="fas fa-calendar-check mr-1"></i>日程確定済
      <span class="ml-1 bg-gray-100 text-gray-600 px-2 py-0.5 rounded-full text-xs" id="count-scheduled">0</span>
    </button>
  </div>

  <div id="progress-content" class="space-y-4">
    <div class="p-8 text-center text-gray-500">読み込み中...</div>
  </div>
</div>

<div id="schedule-modal" class="fixed inset-0 bg-gray-900 bg-opacity-50 hidden flex items-center justify-center z-50">
  <div class="bg-white p-6 rounded-lg shadow-lg w-96">
    <h3 class="text-lg font-bold mb-4 text-gray-800"><i class="fas fa-calendar-plus mr-2"></i>日程登録</h3>
    <p class="text-sm text-gray-600 mb-4 font-bold" id="sched-modal-desc"></p>
    <input type="hidden" id="sched-id">
    <input type="hidden" id="sched-loc-hidden">
    <input type="hidden" id="sched-eq-hidden">
    <input type="hidden" id="sched-work-hidden">
    <div class="mb-4">
      <label class="block text-sm font-bold mb-1 text-gray-700">施工予定日</label>
      <input type="date" id="sched-date" class="w-full border rounded p-2">
    </div>
    <div class="mb-4">
      <label class="block text-sm font-bold mb-1 text-slate-600">備考</label>
      <textarea class="w-full border rounded p-2 text-sm" placeholder="業者名や見積状況など" id="sched-notes"></textarea>
    </div>
    <div class="flex justify-end space-x-2">
      <button onclick="closeScheduleModal()" class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded">キャンセル</button>
      <button onclick="submitSchedule()" class="px-4 py-2 bg-green-600 text-white rounded hover:bg-green-700 font-bold shadow">確定</button>
    </div>
  </div>
</div>

<script>
let currentProgressView = 'all';
let allProjects = [];

function progressInit(f=false) {
  if (!f && window.g_cache.progress) {
    allProjects = window.g_cache.progress;
    renderProgressView();
    return;
  }
  showLoading(true);
  google.script.run.withSuccessHandler(r => {
    window.g_cache.progress = r;
    allProjects = r || [];
    renderProgressView();
    showLoading(false);
  }).getAllActiveProjects();
}

function switchProgressView(view) {
  currentProgressView = view;
  document.querySelectorAll('.progress-tab').forEach(tab => {
    tab.classList.remove('border-blue-600', 'text-blue-600', 'bg-white');
    tab.classList.add('border-transparent', 'text-gray-500');
    const badge = tab.querySelector('span');
    if (badge) {
      badge.classList.remove('bg-blue-100', 'text-blue-700');
      badge.classList.add('bg-gray-100', 'text-gray-600');
    }
  });
  const activeTab = document.getElementById('tab-' + view);
  if (activeTab) {
    activeTab.classList.remove('border-transparent', 'text-gray-500');
    activeTab.classList.add('border-blue-600', 'text-blue-600', 'bg-white');
    const badge = activeTab.querySelector('span');
    if (badge) {
      badge.classList.remove('bg-gray-100', 'text-gray-600');
      badge.classList.add('bg-blue-100', 'text-blue-700');
    }
  }
  renderProgressView();
}

function filterProjectsByView(projects, view) {
  if (view === 'all') return projects;
  if (view === 'action') return projects.filter(p => p.status === '見積依頼中' || p.status === '見積受領');
  if (view === 'waiting') return projects.filter(p => p.status === '発注済');
  if (view === 'scheduled') return projects.filter(p => p.status === '日程確定');
  return projects;
}

function categorizeProjects(projects) {
  const legal = projects.filter(p => p.category === '法定検査');
  const parts = projects.filter(p => p.category === '部材更新');
  const body = projects.filter(p => !legal.includes(p) && !parts.includes(p));
  return { legal, body, parts };
}

function renderProgressView() {
  document.getElementById('count-all').textContent = allProjects.length;
  document.getElementById('count-action').textContent = allProjects.filter(p => p.status === '見積依頼中' || p.status === '見積受領').length;
  document.getElementById('count-waiting').textContent = allProjects.filter(p => p.status === '発注済').length;
  document.getElementById('count-scheduled').textContent = allProjects.filter(p => p.status === '日程確定').length;

  const filtered = filterProjectsByView(allProjects, currentProgressView);
  const categorized = categorizeProjects(filtered);

  const container = document.getElementById('progress-content');
  if (filtered.length === 0) {
    container.innerHTML = '<div class="p-8 text-center text-gray-500 bg-white rounded-lg border">現在進行中の案件はありません</div>';
    return;
  }

  container.innerHTML = `
    <div class="bg-white rounded-lg border-2 border-indigo-200 shadow-md overflow-hidden">
      <div class="bg-indigo-50 p-3 border-b border-indigo-200 flex justify-between items-center">
        <h3 class="text-base font-bold text-indigo-800"><i class="fas fa-balance-scale mr-2"></i>法定検査</h3>
        <span class="text-xs bg-white px-2 py-1 rounded text-indigo-600 font-bold border border-indigo-200">${categorized.legal.length}件</span>
      </div>
      <div id="list-legal" class="divide-y bg-white"></div>
    </div>
    <div class="bg-white rounded-lg border-2 border-rose-200 shadow-md overflow-hidden">
      <div class="bg-rose-50 p-3 border-b border-rose-200 flex justify-between items-center">
        <h3 class="text-base font-bold text-rose-800"><i class="fas fa-exchange-alt mr-2"></i>本体更新・入替</h3>
        <span class="text-xs bg-white px-2 py-1 rounded text-rose-600 font-bold border border-rose-200">${categorized.body.length}件</span>
      </div>
      <div id="list-body" class="divide-y bg-white"></div>
    </div>
    <div class="bg-white rounded-lg border-2 border-blue-200 shadow-md overflow-hidden">
      <div class="bg-blue-50 p-3 border-b border-blue-200 flex justify-between items-center">
        <h3 class="text-base font-bold text-blue-800"><i class="fas fa-cogs mr-2"></i>定期部品交換</h3>
        <span class="text-xs bg-white px-2 py-1 rounded text-blue-600 font-bold border border-blue-200">${categorized.parts.length}件</span>
      </div>
      <div id="list-parts" class="divide-y bg-white"></div>
    </div>
  `;

  renderProjectList('list-legal', categorized.legal);
  renderProjectList('list-body', categorized.body);
  renderProjectList('list-parts', categorized.parts);
}

function renderProjectList(containerId, projects) {
  const container = document.getElementById(containerId);
  if (projects.length === 0) {
    container.innerHTML = '<div class="p-4 text-center text-gray-400 text-sm">該当する案件はありません</div>';
    return;
  }

  const statusOrder = { '日程確定': 4, '発注済': 3, '見積受領': 2, '見積依頼中': 1 };
  projects.sort((a, b) => (statusOrder[b.status] || 0) - (statusOrder[a.status] || 0));

  projects.forEach(p => {
    const s = statusOrder[p.status] || 0;
    const w = (s / 4) * 100;
    const color = s === 4 ? 'bg-green-500' : 'bg-blue-500';
    let btn = '';
    let backBtn = '';
    if (p.status === '見積依頼中') {
      btn = `<button onclick="updateStatus('${p.id}','見積受領')" class="bg-indigo-500 text-white px-3 py-1 rounded text-xs hover:bg-indigo-600 font-bold">受領へ</button>`;
    } else if (p.status === '見積受領') {
      btn = `<button onclick="updateStatus('${p.id}','発注済')" class="bg-orange-500 text-white px-3 py-1 rounded text-xs hover:bg-orange-600 font-bold">発注へ</button>`;
      backBtn = `<button onclick="revertStatus('${p.id}','見積依頼中')" class="text-gray-400 hover:text-gray-600 px-2 py-1 rounded text-xs border border-gray-300 hover:border-gray-400" title="見積依頼中に戻す"><i class="fas fa-undo mr-1"></i>戻す</button>`;
    } else if (p.status === '発注済') {
      btn = `<button onclick="openScheduleModal('${p.id}','${p.locName}','${p.equipmentId}','${p.workType}')" class="bg-green-600 text-white px-3 py-1 rounded text-xs hover:bg-green-700 font-bold">日程登録</button>`;
      backBtn = `<button onclick="revertStatus('${p.id}','見積受領')" class="text-gray-400 hover:text-gray-600 px-2 py-1 rounded text-xs border border-gray-300 hover:border-gray-400" title="見積受領に戻す"><i class="fas fa-undo mr-1"></i>戻す</button>`;
    } else if (p.status === '日程確定') {
      btn = `<button onclick="openCompleteModal('${p.id}','${p.rowNumber}','${p.date}','${p.workType}','${p.locName}','${p.equipmentName||p.equipmentId}')" class="bg-blue-600 text-white px-3 py-1 rounded text-xs hover:bg-blue-700 font-bold">完了報告</button>`;
      backBtn = `<button onclick="revertStatus('${p.id}','発注済')" class="text-gray-400 hover:text-gray-600 px-2 py-1 rounded text-xs border border-gray-300 hover:border-gray-400" title="発注済に戻す"><i class="fas fa-undo mr-1"></i>戻す</button>`;
    }

    const statusBadge = getStatusBadge(p.status);
    const div = document.createElement('div');
    div.className = 'p-3 hover:bg-gray-50 transition';
    div.innerHTML = `
      <div class="flex items-center justify-between gap-4">
        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-2 mb-1">
            <span class="font-bold text-gray-800 text-sm">${p.locName}</span>
            ${statusBadge}
          </div>
          <div class="text-xs text-gray-500 truncate">${p.workType} (${p.equipmentName||p.equipmentId})</div>
          ${p.date ? `<div class="mt-1"><span class="text-xs font-bold text-green-700 bg-green-100 px-2 py-0.5 rounded"><i class="fas fa-calendar mr-1"></i>${p.date}</span></div>` : ''}
        </div>
        <div class="flex items-center gap-2 flex-shrink-0">
          ${backBtn}
          ${btn}
          <button onclick="deleteProject('${p.id}')" class="text-gray-400 hover:text-red-500 p-1 transition" title="案件を取り消す"><i class="fas fa-trash-alt"></i></button>
        </div>
      </div>
      <div class="mt-2 h-1.5 bg-gray-200 rounded-full overflow-hidden">
        <div class="h-full ${color} transition-all" style="width: ${w}%"></div>
      </div>
    `;
    container.appendChild(div);
  });
}

function getStatusBadge(status) {
  const badges = {
    '見積依頼中': '<span class="text-xs px-2 py-0.5 rounded bg-gray-100 text-gray-600 font-bold">見積依頼中</span>',
    '見積受領': '<span class="text-xs px-2 py-0.5 rounded bg-indigo-100 text-indigo-600 font-bold">見積受領</span>',
    '発注済': '<span class="text-xs px-2 py-0.5 rounded bg-orange-100 text-orange-600 font-bold">発注済</span>',
    '日程確定': '<span class="text-xs px-2 py-0.5 rounded bg-green-100 text-green-600 font-bold">日程確定</span>'
  };
  return badges[status] || '';
}

function updateStatus(id, st) {
  if (confirm('ステータスを更新しますか？')) {
    showLoading(true);
    google.script.run
      .withSuccessHandler(function() { showLoading(false); clearCache('progress'); progressInit(true); })
      .withFailureHandler(function(err) { showLoading(false); alert('更新失敗: ' + err); })
      .updateProjectStatus(id, st);
  }
}

function revertStatus(id, st) {
  if (confirm('ステータスを「' + st + '」に戻しますか？')) {
    showLoading(true);
    google.script.run
      .withSuccessHandler(function() { showLoading(false); clearCache('progress'); progressInit(true); })
      .withFailureHandler(function(err) { showLoading(false); alert('更新失敗: ' + err); })
      .updateProjectStatus(id, st);
  }
}

function deleteProject(id) {
  if (confirm('この案件を取り消しますか？\n（未完了のまま終了し、履歴に残します）')) {
    showLoading(true);
    google.script.run.withSuccessHandler(() => { clearCache('progress'); progressInit(true); }).cancelProject(id);
  }
}

function openScheduleModal(id, l, e, w) {
  document.getElementById('sched-id').value = id;
  document.getElementById('sched-date').value = '';
  document.getElementById('sched-notes').value = '';
  document.getElementById('sched-modal-desc').innerText = `${l} / ${e} - ${w}`;
  document.getElementById('schedule-modal').classList.remove('hidden');
}

function directSchedule(l, e, w) {
  document.getElementById('sched-id').value = 'DIRECT';
  document.getElementById('sched-loc-hidden').value = l;
  document.getElementById('sched-eq-hidden').value = e;
  document.getElementById('sched-work-hidden').value = w;
  document.getElementById('sched-date').value = '';
  document.getElementById('sched-notes').value = '';
  document.getElementById('sched-modal-desc').innerText = `新規: ${l} - ${w}`;
  document.getElementById('schedule-modal').classList.remove('hidden');
}

function closeScheduleModal() { document.getElementById('schedule-modal').classList.add('hidden'); }

function submitSchedule() {
  const id = document.getElementById('sched-id').value;
  const d = document.getElementById('sched-date').value;
  const n = document.getElementById('sched-notes').value;
  if (!d) return alert('日付を入力してください');
  showLoading(true);
  closeScheduleModal();
  const cb = () => { clearCache('progress'); progressInit(true); };
  if (id === 'DIRECT') {
    google.script.run.withSuccessHandler(cb).createScheduleAndRecord(
      document.getElementById('sched-loc-hidden').value,
      document.getElementById('sched-eq-hidden').value,
      document.getElementById('sched-work-hidden').value, d, n);
  } else {
    google.script.run.withSuccessHandler(cb).createScheduleAndRecord('', '', '', d, n, id);
  }
}
</script>
