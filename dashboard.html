<!-- Dashboard View -->
<div class="space-y-8">
  <div class="flex justify-between items-center border-b pb-4">
    <h2 class="text-2xl font-bold text-gray-800"><i class="fas fa-chart-pie mr-2"></i>ダッシュボード</h2>
    <button onclick="dashboardInit(true)" class="bg-blue-600 hover:bg-blue-700 text-white px-3 py-1 rounded text-sm transition shadow">
      <i class="fas fa-sync-alt mr-1"></i> 更新
    </button>
  </div>

  <!-- 上段: 法定検査 -->
  <div class="bg-white rounded-lg border-2 border-indigo-200 shadow-md overflow-hidden">
    <div class="bg-indigo-50 p-3 border-b border-indigo-200 flex justify-between items-center">
      <h3 class="text-lg font-bold text-indigo-800"><i class="fas fa-balance-scale mr-2"></i>【最優先】法定検査</h3>
      <span class="text-xs bg-white px-2 py-1 rounded text-indigo-600 font-bold border border-indigo-200" id="count-legal">0件</span>
    </div>
    <div class="flex justify-between items-center p-3 bg-indigo-50 border-b">
      <div class="flex gap-2">
        <button onclick="selectAllLegal()" class="text-xs px-3 py-1 bg-white border rounded hover:bg-gray-50">
          <i class="fas fa-check-square mr-1"></i>すべて選択
        </button>
        <button onclick="deselectAllLegal()" class="text-xs px-3 py-1 bg-white border rounded hover:bg-gray-50">
          <i class="fas fa-square mr-1"></i>選択解除
        </button>
      </div>
      <span class="text-xs font-bold text-indigo-600" id="legal-selected-count">0件選択中</span>
    </div>
    <div class="overflow-x-auto">
      <table class="w-full text-sm text-left">
        <thead class="bg-indigo-100 text-indigo-800">
          <tr>
            <th class="p-2 w-10">
              <input type="checkbox" class="legal-checkbox-all accent-indigo-600" onchange="toggleAllLegal(this)">
            </th>
            <th class="p-2">拠点</th>
            <th class="p-2">設備名</th>
            <th class="p-2">期限</th>
          </tr>
        </thead>
        <tbody id="table-legal" class="divide-y divide-indigo-100"><tr><td colspan="4" class="p-4 text-center text-gray-400">なし</td></tr></tbody>
      </table>
    </div>
    <div class="p-3 bg-indigo-50 border-t flex gap-2 justify-end">
      <button onclick="bulkCreateProjectsLegal()" 
              class="px-4 py-2 bg-purple-600 text-white rounded text-sm hover:bg-purple-700 disabled:bg-gray-400"
              id="btn-bulk-project-legal" disabled>
        <i class="fas fa-clipboard-list mr-1"></i>選択した案件を作成
      </button>
      <button onclick="bulkCreateEmailsLegal()" 
              class="px-4 py-2 bg-blue-600 text-white rounded text-sm hover:bg-blue-700 disabled:bg-gray-400"
              id="btn-bulk-email-legal" disabled>
        <i class="fas fa-envelope mr-1"></i>選択した案件のメール作成
      </button>
    </div>
  </div>

  <!-- 中段: 重要設備（井戸ポンプメンテを含む） -->
  <div class="bg-white rounded-lg border-2 border-rose-200 shadow-md overflow-hidden">
    <div class="bg-rose-50 p-3 border-b border-rose-200 flex justify-between items-center">
      <h3 class="text-lg font-bold text-rose-800"><i class="fas fa-exclamation-triangle mr-2"></i>【重要】本体更新・入替</h3>
      <span class="text-xs bg-white px-2 py-1 rounded text-rose-600 font-bold border border-rose-200" id="count-major">0件</span>
    </div>
    <div class="flex justify-between items-center p-3 bg-rose-50 border-b">
      <div class="flex gap-2">
        <button onclick="selectAllMajor()" class="text-xs px-3 py-1 bg-white border rounded hover:bg-gray-50">
          <i class="fas fa-check-square mr-1"></i>すべて選択
        </button>
        <button onclick="deselectAllMajor()" class="text-xs px-3 py-1 bg-white border rounded hover:bg-gray-50">
          <i class="fas fa-square mr-1"></i>選択解除
        </button>
      </div>
      <span class="text-xs font-bold text-rose-600" id="major-selected-count">0件選択中</span>
    </div>
    <div class="overflow-x-auto">
      <table class="w-full text-sm text-left">
        <thead class="bg-rose-100 text-rose-800">
          <tr>
            <th class="p-2 w-10">
              <input type="checkbox" class="major-checkbox-all accent-rose-600" onchange="toggleAllMajor(this)">
            </th>
            <th class="p-2">拠点</th>
            <th class="p-2">設備名</th>
            <th class="p-2">状況</th>
          </tr>
        </thead>
        <tbody id="table-major" class="divide-y divide-rose-100"><tr><td colspan="4" class="p-4 text-center text-gray-400">なし</td></tr></tbody>
      </table>
    </div>
    <div class="p-3 bg-rose-50 border-t flex gap-2 justify-end">
      <button onclick="bulkCreateProjectsMajor()" 
              class="px-4 py-2 bg-purple-600 text-white rounded text-sm hover:bg-purple-700 disabled:bg-gray-400"
              id="btn-bulk-project-major" disabled>
        <i class="fas fa-clipboard-list mr-1"></i>選択した案件を作成
      </button>
      <button onclick="bulkCreateEmailsMajor()" 
              class="px-4 py-2 bg-blue-600 text-white rounded text-sm hover:bg-blue-700 disabled:bg-gray-400"
              id="btn-bulk-email-major" disabled>
        <i class="fas fa-envelope mr-1"></i>選択した案件のメール作成
      </button>
    </div>
  </div>

  <!-- ベーパー回収率アラート -->
  <div id="vr-alert-card" class="bg-white rounded-lg border-2 border-cyan-200 shadow-md overflow-hidden hidden">
    <div class="bg-cyan-50 p-3 border-b border-cyan-200 flex justify-between items-center cursor-pointer" onclick="navigate('vr')">
      <h3 class="text-lg font-bold text-cyan-800"><i class="fas fa-tachometer-alt mr-2"></i>ベーパー回収率</h3>
      <span class="text-xs bg-white px-2 py-1 rounded text-cyan-600 font-bold border border-cyan-200" id="vr-alert-badge">-</span>
    </div>
    <div id="vr-alert-body" class="p-4">

    </div>
  </div>

  <!-- 4月実施一括発注アラート -->
  <div class="bg-white rounded-lg border-2 border-blue-200 shadow-md overflow-hidden">
    <div class="bg-blue-50 p-3 border-b border-blue-200">
      <h3 class="text-lg font-bold text-blue-800"><i class="fas fa-calendar-alt mr-2"></i>【4月実施】定期部品交換・一括発注</h3>
    </div>
    <div id="bulk-order-alerts" class="divide-y divide-blue-100">
      <div class="p-4 text-center text-gray-400 text-sm">読み込み中...</div>
    </div>
  </div>
</div>

<script>
console.log('✅ dashboard.html script loaded');

function dashboardInit(f=false) {
  console.log('🚀 dashboardInit called, force:', f);
  
  // 安全にg_cacheを確認
  if (!window.g_cache) {
    console.log('ℹ️ Initializing g_cache');
    window.g_cache = {};
  }

  if(!f && window.g_cache.dashboard) { 
    console.log('📦 Using cached dashboard data');
    renderDashboard(window.g_cache.dashboard);
    loadAllBulkOrderAlerts();
    loadVRAlert();
    return; 
  }

  // showLoadingのエラーで止まらないように保護
  try {
    console.log('⏳ Calling showLoading(true)...');
    if (typeof showLoading === 'function') {
      showLoading(true);
    } else {
      console.warn('⚠️ showLoading function not found');
    }
  } catch (e) {
    console.error('⚠️ showLoading execution failed (Ignoring):', e);
  }

  console.log('📡 Fetching new dashboard data...');
  google.script.run
    .withSuccessHandler(d => { 
      console.log('✅ Dashboard data received', d);
      window.g_cache.dashboard=d; 
      
      try {
        renderDashboard(d); 
      } catch(e) {
        console.error('❌ renderDashboard failed:', e);
      }
      
      try {
        console.log('▶ Triggering loadAllBulkOrderAlerts from SuccessHandler');
        loadAllBulkOrderAlerts();
      } catch(e) {
        console.error('❌ loadAllBulkOrderAlerts call failed:', e);
      }
      try { loadVRAlert(); } catch(e) { console.error('VR alert load failed:', e); }
    })
    .withFailureHandler(e => {
      console.error('❌ Dashboard data fetch failed', e);
      try { showLoading(false); } catch(err) {}
      alert('データの読み込みに失敗しました: ' + e);
    })
    .getDashboardData();
}

function renderDashboard(data) {
  try { showLoading(false); } catch(e) {}
  
  const legalT = document.getElementById('table-legal'); 
  legalT.innerHTML = '';
  const majorT = document.getElementById('table-major'); 
  majorT.innerHTML = '';
  
  let lCount = 0, mjCount = 0;

  if (data && data.noticeList) {
    data.noticeList.forEach(i => {
      const category = i['カテゴリ'];
      
      // アラート判定を個別に定義
      const hasBodyAlert = i['本体ステータス'] !== '正常';
      const hasPartAAlert = i['部品Aステータス'] !== '正常';
      const hasPartBAlert = i['部品Bステータス'] && i['部品Bステータス'] !== '正常';
      
      const tr = document.createElement('tr');
      
      // 法定検査セクション（部品Aのみアラート）
      if (category === '法定検査' && hasPartAAlert) {
        lCount++;
        tr.className = "hover:bg-indigo-50";
        
        let statusLabel = i['部品Aステータス'];
        let statusColor = (statusLabel === '期限超過') ? 'text-red-600' : 'text-indigo-600';
        let status = `<span class="font-bold ${statusColor}">${statusLabel}</span>`;
        
        tr.innerHTML = `
          <td class="p-2">
            <input type="checkbox" class="legal-checkbox accent-indigo-600"
                   data-loc="${i['拠点コード']}"
                   data-eq="${i['設備ID']}"
                   data-name="${i['拠点名']}"
                   data-eqname="${i['設備名']}"
                   onchange="updateLegalSelection()">
          </td>
          <td class="p-2 font-bold">${i['拠点名']}</td>
          <td class="p-2">${i['設備名']}</td>
          <td class="p-2">${status}</td>
        `;
        legalT.appendChild(tr);
      }
      // 本体更新・美観セクション（本体または部品Bのアラート）
      else if ((category === '本体更新' || category === '美観') && (hasBodyAlert || hasPartBAlert)) {
        mjCount++;
        tr.className = "hover:bg-rose-50";
        
        // ステータス表示の優先順位：本体 > 部品B
        let statusLabel = '';
        let statusColor = '';
        
        if (hasBodyAlert) {
          statusLabel = i['本体ステータス'];
          statusColor = (statusLabel === '期限超過') ? 'text-rose-600' : 'text-amber-600';
        } else if (hasPartBAlert) {
          statusLabel = i['部品Bステータス'];
          statusColor = 'text-amber-600';
        }
        
        let status = `<span class="font-bold ${statusColor}">${statusLabel}</span>`;
        if(i['subsidyAlert']) {
          status += `<br><span class="text-xs text-white bg-red-500 px-1 rounded">${i['subsidyAlert']}</span>`;
        }
        
        const eqName = i['設備名'] || '';
        tr.innerHTML = `
          <td class="p-2">
            <input type="checkbox" class="major-checkbox accent-rose-600"
                   data-loc="${i['拠点コード']}"
                   data-eq="${i['設備ID']}"
                   data-name="${i['拠点名']}"
                   data-eqname="${eqName}"
                   onchange="updateMajorSelection()">
          </td>
          <td class="p-2 font-bold">${i['拠点名']}</td>
          <td class="p-2">${i['設備名']}</td>
          <td class="p-2">${status}</td>
        `;
        majorT.appendChild(tr);
      }
      // 部材更新・不定期はダッシュボードに表示しない（設備一覧で管理）
    });
  }

  document.getElementById('count-legal').innerText = lCount + '件';
  document.getElementById('count-major').innerText = mjCount + '件';

  if(lCount===0) legalT.innerHTML = '<tr><td colspan="4" class="p-4 text-center text-gray-400 text-xs">対応が必要な法定検査はありません</td></tr>';
  if(mjCount===0) majorT.innerHTML = '<tr><td colspan="4" class="p-4 text-center text-gray-400 text-xs">対応が必要な重要案件はありません</td></tr>';
  
  updateLegalSelection();
  updateMajorSelection();
}

// ========================================
// 法定検査セクション - チェックボックス操作
// ========================================

function updateLegalSelection() {
  const checked = document.querySelectorAll('.legal-checkbox:checked');
  document.getElementById('legal-selected-count').textContent = `${checked.length}件選択中`;
  document.getElementById('btn-bulk-project-legal').disabled = (checked.length === 0);
  document.getElementById('btn-bulk-email-legal').disabled = (checked.length === 0);
}

function selectAllLegal() {
  document.querySelectorAll('.legal-checkbox').forEach(cb => cb.checked = true);
  updateLegalSelection();
}

function deselectAllLegal() {
  document.querySelectorAll('.legal-checkbox').forEach(cb => cb.checked = false);
  updateLegalSelection();
}

function toggleAllLegal(checkbox) {
  document.querySelectorAll('.legal-checkbox').forEach(cb => cb.checked = checkbox.checked);
  updateLegalSelection();
}

function bulkCreateProjectsLegal() {
  const checked = Array.from(document.querySelectorAll('.legal-checkbox:checked'));
  if (checked.length === 0) return;
  
  if (!confirm(`${checked.length}件の案件を作成しますか?`)) return;
  
  showLoading(true);
  let completed = 0;
  
  checked.forEach((cb) => {
    const locCode = cb.dataset.loc;
    const eqId = cb.dataset.eq;
    const locName = cb.dataset.name;
    const eqName = cb.dataset.eqname;
    
    google.script.run
      .withSuccessHandler(() => {
        completed++;
        if (completed === checked.length) {
          showLoading(false);
          alert(`${completed}件の案件を作成しました`);
          deselectAllLegal();
          dashboardInit(true);
        }
      })
      .withFailureHandler((error) => {
        showLoading(false);
        alert(`エラー: ${error}`);
      })
      .createIndividualProject(locCode, eqId, locName, eqName, '法定検査');
  });
}

function bulkCreateEmailsLegal() {

      })

        showLoading(false);

// 全ての一括発注アラート読み込み（ノズルカバー + その他4種類）
function loadAllBulkOrderAlerts() {
  console.log('🔄 loadAllBulkOrderAlerts started');
  const container = document.getElementById('bulk-order-alerts');
  if (!container) {
    console.error('❌ Container #bulk-order-alerts not found');
    return;
  }
  
  container.innerHTML = '<div class="p-4 text-center text-gray-400 text-sm"><i class="fas fa-spinner fa-spin mr-2"></i>一括発注情報を確認中...</div>';
  
  // ノズルカバー情報を取得
  console.log('📡 Calling getNozzleCoverInfo...');
  google.script.run
    .withSuccessHandler(function(nozzleInfo) {
      console.log('✅ getNozzleCoverInfo success:', nozzleInfo);
      
      // その他の一括発注情報を取得
      console.log('📡 Calling getAllBulkOrderInfo...');
      google.script.run
        .withSuccessHandler(function(allInfo) {
          console.log('✅ getAllBulkOrderInfo success:', allInfo);
          
          window.bulkOrderDataMap = {};
          window.nozzleCoverData = nozzleInfo;
          
          container.innerHTML = '';
          
          let hasAnyAlert = false;
          
          // ノズルカバーを表示
          if (nozzleInfo && nozzleInfo.hasAlert) {
            hasAnyAlert = true;
            // ノズルカバーのデータも bulkOrderDataMap に追加（createBulkOrderProjectFor で使用）
            window.bulkOrderDataMap = window.bulkOrderDataMap || {};
            window.bulkOrderDataMap['PARTS-PUMP-1Y'] = nozzleInfo;
            try {
              const div = createBulkAlertDiv(nozzleInfo, 'nozzle');
              container.appendChild(div);
            } catch(e) { console.error('Error creating nozzle div', e); }
          }
          
          // その他の4種類を表示
          if (allInfo && Array.isArray(allInfo)) {
            allInfo.forEach(function(info) {
              const equipmentId = info.config.id;
              window.bulkOrderDataMap[equipmentId] = info;
              
              if (info.hasAlert) {
                hasAnyAlert = true;
                try {
                  const div = createBulkAlertDiv(info, 'standard');
                  container.appendChild(div);
                } catch(e) { console.error('Error creating standard div', e); }
              }
            });
          }
          
          if (!hasAnyAlert) {
            container.innerHTML = '<div class="p-4 text-center text-gray-400 text-sm">4月実施予定の一括発注はありません</div>';
          }
        })
        .withFailureHandler(function(error) {
          console.error('❌ getAllBulkOrderInfo failed:', error);
          container.innerHTML = '<div class="p-4 text-center text-red-400 text-sm">一括発注情報の読み込みに失敗しました</div>';
        })
        .getAllBulkOrderInfo();
    })
    .withFailureHandler(function(error) {
      console.error('❌ getNozzleCoverInfo failed:', error);
      container.innerHTML = '<div class="p-4 text-center text-red-400 text-sm">読み込みに失敗しました</div>';
    })
    .getNozzleCoverInfo();
}

// 一括発注アラート要素を作成
function createBulkAlertDiv(info, type) {
  const div = document.createElement('div');
  div.className = 'p-4 border-b border-blue-100 hover:bg-blue-50 transition';
  
  let storeList = '';
  if (info.targetStores && info.targetStores.length > 0) {
    if (info.targetStores.length <= 8) {
      storeList = info.targetStores.map(function(s) { return s.name; }).join(', ');
    } else {
      storeList = info.targetStores.slice(0, 5).map(function(s) { return s.name; }).join(', ') + ' 他' + (info.targetStores.length - 5) + '店舗';
    }
  }
  
  const equipmentId = info.config.id;
  
  const buttons = `
    <button onclick="showBulkEmailDraftWithGmail('${equipmentId}')" 
            class="bg-blue-600 hover:bg-blue-700 text-white px-3 py-1 rounded text-xs transition shadow">
      <i class="fas fa-envelope mr-1"></i>メール下書き
    </button>
    <button onclick="createBulkOrderProjectFor('${equipmentId}')" 
            class="bg-purple-600 hover:bg-purple-700 text-white px-3 py-1 rounded text-xs transition shadow">
      <i class="fas fa-clipboard-list mr-1"></i>案件作成
    </button>
  `;
  
  div.innerHTML = `
    <div class="flex items-start justify-between mb-2">
      <div class="flex-1">
        <div class="text-base font-bold text-blue-900 mb-1">
          ${info.config.emoji || ''} ${info.config.name} (${info.targetYear}年4月実施予定) - ${info.targetCount}店舗
        </div>
        <div class="text-sm text-blue-700 ml-7 mt-1">
          対象: ${storeList}
        </div>
      </div>
    </div>
    <div class="flex gap-2 ml-7 mt-2">
      ${buttons}
    </div>
  `;
  
  return div;
}


// ノズルカバー交換Gmail下書き作成
function createNozzleCoverGmailDraft() {
  if (!confirm('Gmailの下書きを作成しますか？')) return;
  
  showLoading(true);
  google.script.run
    .withSuccessHandler(function(result) {
      showLoading(false);
      alert('✅ ' + result.message + '\n\n件名: ' + result.subject + '\n宛先: ' + result.recipient + '\n\nGmailの下書きを確認してください。');
    })

  if (!confirm(`${checked.length}件の案件を作成しますか?`)) return;
  
  showLoading(true);
  let completed = 0;
  
  checked.forEach((cb) => {
    const equipmentId = cb.dataset.equipmentId;

    const locName = cb.dataset.locName;

        completed++;

          showLoading(false);
          alert(`${completed}件の案件を作成しました`);
          deselectAllParts();

        }

}

function bulkCreateEmailsParts() {
  const checked = Array.from(document.querySelectorAll('.parts-checkbox:checked'));
  if (checked.length === 0) return;
  
  // 設備IDごとにグループ化
  const equipmentGroups = {};
  checked.forEach((cb) => {
    const equipmentId = cb.dataset.equipmentId;
    if (!equipmentGroups[equipmentId]) {
      equipmentGroups[equipmentId] = [];
    }
    equipmentGroups[equipmentId].push({
      locCode: cb.dataset.locCode,
      locName: cb.dataset.locName
    });
  });
  
  if (!confirm(`${checked.length}件のメール下書きを作成しますか?`)) return;
  
  showLoading(true);
  let completed = 0;
  const total = Object.keys(equipmentGroups).length;
  
  // 設備IDごとにメール下書きを作成
  for (const equipmentId in equipmentGroups) {
    const stores = equipmentGroups[equipmentId];
    const storeNames = stores.map(s => s.locName).join(', ');
    
    // 個別のメール下書きを作成（設備IDと店舗リストを渡す）
    google.script.run
      .withSuccessHandler(() => {
        completed++;
        if (completed === total) {
          showLoading(false);
          alert(`${total}件のメール下書きを作成しました`);
          deselectAllParts();
        }
      })
      .withFailureHandler((error) => {
        showLoading(false);
        alert(`エラー: ${error}`);
      })
      .createBulkOrderGmailDraft(equipmentId);
  }
}

// ── ベーパー回収率アラート ──
function loadVRAlert() {
  google.script.run
    .withSuccessHandler(function(summary) {
      var card = document.getElementById('vr-alert-card');
      var badge = document.getElementById('vr-alert-badge');
      var body = document.getElementById('vr-alert-body');

      if (!summary || !summary.latestMonth) {
        card.classList.add('hidden');
        return;
      }

      card.classList.remove('hidden');
      var total = summary.anomalyCount + summary.lowConfidenceCount + summary.missingStores.length;
      badge.textContent = total > 0 ? total + '件要対応' : '正常';

      var html = '<div class="text-sm text-gray-600 mb-2">最新データ: ' + summary.latestMonth + '</div>';

      if (summary.anomalyCount > 0) {
        html += '<div class="flex items-center gap-2 mb-1"><span class="bg-red-100 text-red-700 px-2 py-0.5 rounded text-xs">異常値</span><span class="text-sm">' + summary.anomalyCount + '件 (正常範囲: 0.05%〜0.2%)</span></div>';
      }
      if (summary.lowConfidenceCount > 0) {
        html += '<div class="flex items-center gap-2 mb-1"><span class="bg-yellow-100 text-yellow-700 px-2 py-0.5 rounded text-xs">要確認</span><span class="text-sm">' + summary.lowConfidenceCount + '件 (PDF読取精度低)</span></div>';
      }
      if (summary.missingStores.length > 0) {
        html += '<div class="flex items-center gap-2 mb-1"><span class="bg-gray-100 text-gray-700 px-2 py-0.5 rounded text-xs">未報告</span><span class="text-sm">' + summary.missingStores.join(', ') + '</span></div>';
      }
      if (total === 0) {
        html += '<div class="text-green-600 text-sm">全店舗正常</div>';
      }
      html += '<div class="mt-2"><button onclick="navigate(\'vr\')" class="text-cyan-600 hover:underline text-xs">詳細を見る →</button></div>';

      body.innerHTML = html;
    })
    .withFailureHandler(function() {
      document.getElementById('vr-alert-card').classList.add('hidden');
    })
    .getVaporRecoverySummary();
}
